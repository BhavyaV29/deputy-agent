name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --group dev
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy
      - name: Pytest
        run: uv run pytest

  web-demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Parser tests
        run: npm test
